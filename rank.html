<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>煙幕スコアランキング - 煙羅煙羅5周年</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: "MS PGothic", "Osaka", monospace;
    padding: 24px 12px;
  }
  .enra-rank-page {
    width: 100%;
    max-width: 480px;
  }
  .enra-rank-back {
    display: inline-block;
    margin-bottom: 12px;
    color: #b8a8e8;
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 1px;
  }
  .enra-rank-back:hover { text-decoration: underline; }

  .enra-rank-board {
    border: 3px solid #8a8a6a;
    box-shadow: inset 0 0 0 2px #2a2a1a, 0 0 0 4px #000;
    background: #d8d4b8;
    padding: 8px;
  }
  .enra-rank-titlebar {
    background: linear-gradient(to bottom, #6a6a8a 0%, #3a3a5a 100%);
    color: #fff;
    font-size: 12px;
    padding: 3px 8px;
    margin-bottom: 6px;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }
  .enra-rank-blink { animation: enra-rank-blink 1s steps(2) infinite; }
  @keyframes enra-rank-blink { 50% { opacity: 0; } }
  .enra-rank-body {
    border: 2px inset #888;
    background: #04040a;
    color: #d8d4b8;
    padding: 20px 16px;
  }
  .enra-rank-heading {
    font-size: 16px;
    color: #b8a8e8;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 4px;
  }
  .enra-rank-sub {
    font-size: 10px;
    color: #888;
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.7;
  }
  .enra-rank-loading {
    font-size: 11px;
    color: #888;
    text-align: center;
    padding: 20px 0;
  }
  .enra-rank-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 8px 4px;
    border-bottom: 1px dotted #444;
  }
  .enra-rank-row.enra-rank-top1 { color: #f0d878; font-size: 15px; }
  .enra-rank-row.enra-rank-top2 { color: #dcdcdc; font-size: 14px; }
  .enra-rank-row.enra-rank-top3 { color: #d4a06a; font-size: 14px; }
  .enra-rank-pos {
    width: 26px;
    text-align: right;
    flex-shrink: 0;
  }
  .enra-rank-name {
    flex: 1;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .enra-rank-char {
    font-size: 9px;
    color: #888;
    flex-shrink: 0;
  }
  .enra-rank-score {
    width: 64px;
    text-align: right;
    flex-shrink: 0;
    color: #9ac8a8;
  }
  .enra-rank-reload-btn {
    display: block;
    margin: 18px auto 0;
    background: #3a3a5a;
    color: #d8d4b8;
    border: 2px outset #8a8a9a;
    font-size: 12px;
    padding: 7px 20px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .enra-rank-reload-btn:active { border-style: inset; }
  .enra-rank-empty {
    font-size: 11px;
    color: #888;
    text-align: center;
    padding: 20px 0;
  }
  .enra-rank-play-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
  }
  .enra-rank-play-link a {
    color: #9ac8a8;
    text-decoration: none;
  }
  .enra-rank-play-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="enra-rank-page">
  <a href="index.html" class="enra-rank-back">&laquo; プロフィールへ戻る</a>

  <div class="enra-rank-board">
    <div class="enra-rank-titlebar">
      <span>ENRA_RANKING.EXE</span>
      <span class="enra-rank-blink">■</span>
    </div>
    <div class="enra-rank-body">
      <h1 class="enra-rank-heading">煙幕スコアランキング</h1>
      <div class="enra-rank-sub">「煙羅煙羅の煙幕」ハイスコア上位10名<br>店の奥から漂う煙を、誰が最も追い払ったか。</div>
      <div id="enra-rank-list" class="enra-rank-list">
        <div class="enra-rank-loading">読み込み中...</div>
      </div>
      <button id="enra-rank-reload" class="enra-rank-reload-btn">更新する</button>
      <div class="enra-rank-play-link">
        <a href="enra-danmaku.html">→ 煙幕シューティングをプレイする</a>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const RANKING_API_URL = 'https://script.google.com/macros/s/AKfycbzuYHcElDrOh7s12iBffLcovUZIp6HLL-Wmt-n2g7rroGaiAI0aFnFcS2cM9FKn1uSi1g/exec';

  const listEl = document.getElementById('enra-rank-list');
  const reloadBtn = document.getElementById('enra-rank-reload');

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderList(list) {
    if (!list || list.length === 0) {
      listEl.innerHTML = '<div class="enra-rank-empty">まだランキングがありません</div>';
      return;
    }
    const rows = list.slice(0, 10).map((r, i) => {
      const topClass = i === 0 ? 'enra-rank-top1' : (i === 1 ? 'enra-rank-top2' : (i === 2 ? 'enra-rank-top3' : ''));
      return `
        <div class="enra-rank-row ${topClass}">
          <span class="enra-rank-pos">${i+1}</span>
          <span class="enra-rank-name">${escapeHtml(r.name)}</span>
          <span class="enra-rank-char">${escapeHtml(r.character || '')}</span>
          <span class="enra-rank-score">${r.score}</span>
        </div>
      `;
    }).join('');
    listEl.innerHTML = rows;
  }

  function loadRanking() {
    listEl.innerHTML = '<div class="enra-rank-loading">読み込み中...</div>';
    fetch(RANKING_API_URL + '?action=ranking')
      .then(r => r.json())
      .then(data => renderList(data))
      .catch(() => {
        listEl.innerHTML = '<div class="enra-rank-empty">読み込みに失敗しました</div>';
      });
  }

  if (reloadBtn) reloadBtn.addEventListener('click', loadRanking);
  loadRanking();
})();
</script>

</body>
</html>
