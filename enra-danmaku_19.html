<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>煙羅煙羅の煙幕 -ENRA DANMAKU-</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "Noto Serif JP", "Hiragino Mincho ProN", "MS Mincho", serif;
  }
  #game-wrap {
    position: relative;
    width: 480px;
    border: 3px solid #6a1414;
    box-shadow: inset 0 0 0 2px #1a0505, 0 0 0 4px #000;
    background: #1a0808;
    padding: 8px;
  }
  #titlebar {
    background: linear-gradient(to bottom, #9c1414 0%, #4a0606 100%);
    color: #ffe9b0;
    font-size: 12px;
    padding: 3px 8px;
    margin-bottom: 6px;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #ff6b6b;
  }
  #canvas-frame {
    border: 2px inset #6a2020;
    background: #000;
    position: relative;
    line-height: 0;
  }
  canvas {
    display: block;
    background: #050202;
    touch-action: none;
    image-rendering: pixelated;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #d4a86a;
    padding: 6px 4px 2px;
    letter-spacing: 1px;
  }
  #hud span { color: #00ff66; text-shadow: 0 0 4px rgba(0,255,102,0.6); font-family: "VT323", "Courier New", monospace; font-size: 15px; }
  #msg-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5,2,2,0.92);
    color: #e8e0d8;
    text-align: center;
    font-size: 12px;
    line-height: 1.8;
    padding: 16px;
    overflow-y: auto;
  }
  #msg-overlay.hidden { display: none; }
  #msg-overlay h1 {
    font-size: 18px;
    margin-bottom: 12px;
    letter-spacing: 2px;
    background: linear-gradient(180deg, #fff6cf 0%, #e8c34a 35%, #b8860b 60%, #8a5a00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  }
  #msg-overlay .sub {
    font-size: 10px;
    color: #8a7a70;
    margin-top: 3px;
  }
  #start-btn, #retry-btn {
    margin-top: 14px;
    background: linear-gradient(180deg, #9c1414, #5c0808);
    color: #ffe9b0;
    border: 1px solid #ff6b6b;
    font-size: 13px;
    padding: 8px 22px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 2px;
    border-radius: 2px;
  }
  #start-btn:active, #retry-btn:active { transform: translateY(1px); }
  #score-banner {
    margin-top: 10px;
    font-size: 26px;
    color: #00ff66;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(0,255,102,0.6);
    font-family: "VT323", "Courier New", monospace;
  }
  #stamp-note {
    margin-top: 14px;
    font-size: 11px;
    color: #6a9a7a;
    border-top: 1px dashed #4a2020;
    padding-top: 10px;
    max-width: 320px;
  }
  #char-select-label {
    margin-top: 14px;
    font-size: 11px;
    color: #d4af37;
    letter-spacing: 1px;
  }
  #rank-form-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  #rank-name-input {
    margin-top: 4px;
    font-family: inherit;
    font-size: 12px;
    padding: 5px 8px;
    border: 2px inset #6a2020;
    background: #fff8e8;
    color: #222;
    width: 160px;
    text-align: center;
  }
  #rank-submit-btn {
    margin-top: 4px;
    background: linear-gradient(180deg, #1a6a3a, #0a3a1a);
    color: #d0ffe0;
    border: 1px solid #4aff8a;
    font-size: 12px;
    padding: 6px 16px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    border-radius: 2px;
  }
  #rank-submit-btn:active { transform: translateY(1px); }
  #rank-submit-btn:disabled { opacity: 0.6; cursor: default; }
  #ranking-list-area {
    width: 100%;
    max-width: 320px;
  }
  #ranking-list {
    margin-top: 6px;
    border-top: 1px dashed #4a2020;
    padding-top: 6px;
  }
  .rank-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    padding: 3px 4px;
    border-bottom: 1px dotted #3a1515;
  }
  .rank-row.rank-top { color: #ffe9b0; }
  .rank-pos {
    width: 18px;
    text-align: right;
    flex-shrink: 0;
    color: #d41818;
  }
  .rank-row.rank-top .rank-pos { color: inherit; }
  .rank-name {
    flex: 1;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rank-char {
    font-size: 9px;
    color: #8a7a70;
    flex-shrink: 0;
  }
  .rank-score {
    width: 50px;
    text-align: right;
    flex-shrink: 0;
    color: #00ff66;
    font-family: "VT323", "Courier New", monospace;
    font-size: 15px;
    text-shadow: 0 0 4px rgba(0,255,102,0.5);
  }
  #char-select-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
    width: 100%;
    max-width: 400px;
  }
  .char-list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #200a0a;
    border: 2px solid #4a2020;
    border-radius: 4px;
    padding: 8px 10px;
    cursor: pointer;
    transition: border-color 0.15s;
    text-align: left;
  }
  .char-list-item img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
    background: #fff;
  }
  .char-info {
    flex: 1;
    min-width: 0;
  }
  .char-info-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .char-name {
    font-size: 12px;
    color: #e8dcc8;
  }
  .char-desc {
    font-size: 10px;
    color: #d4af37;
  }
  .char-skill {
    font-size: 9px;
    color: #8a7a70;
    margin-top: 2px;
    line-height: 1.4;
  }
  .char-meters {
    margin-top: 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px 10px;
  }
  .meter-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .meter-label {
    font-size: 8px;
    color: #6a5a50;
    width: 24px;
    flex-shrink: 0;
  }
  .meter-dots {
    display: flex;
    gap: 2px;
  }
  .meter-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3a1515;
    display: inline-block;
  }
  .meter-dot.filled {
    background: #00ff66;
    box-shadow: 0 0 3px rgba(0,255,102,0.6);
  }
  .char-list-item.selected {
    border-color: #00ff66;
    background: #0a2a1a;
    box-shadow: 0 0 8px rgba(0,255,102,0.3);
  }
  .blink { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div id="game-wrap">
  <div id="titlebar">
    <span>ENRA_DANMAKU.EXE</span>
    <span id="clock-blink" class="blink">■</span>
  </div>
  <div id="canvas-frame">
    <canvas id="game" width="464" height="500"></canvas>
    <div id="msg-overlay">
      <div class="sub">Loading...</div>
    </div>
  </div>
  <div id="hud">
    <div>SCORE <span id="score-val">0</span></div>
    <div>HI <span id="hi-val">0</span></div>
    <div>LIFE <span id="life-val">●●●</span></div>
  </div>
</div>

  function getKillLine(charKey, killCount) {
    const lines = KILL_LINES[charKey];
    if (!lines) return '';
    const idx = Math.min(killCount, lines.length) - 1;
    return lines[idx] || '';
  }

  function loadImages(cb) {
    const keys = Object.keys(ASSET_DATA);
    let remaining = keys.length;
    keys.forEach(k => {
      const img = new Image();
      img.onload = () => { remaining--; if (remaining === 0) cb(); };
      img.onerror = () => { remaining--; if (remaining === 0) cb(); };
      img.src = ASSET_DATA[k];
      IMG[k] = img;
    });
  }

  function canvasPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (W / rect.width),
      y: (clientY - rect.top) * (H / rect.height)
    };
  }
  canvas.addEventListener('mousemove', e => {
    const p = canvasPos(e.clientX, e.clientY);
    pointer.active = true; pointer.x = p.x; pointer.y = p.y;
  });
  canvas.addEventListener('mousedown', () => {
    if (state === 'dialogue' || state === 'levelup') { advanceCutscene(); return; }
    firing = true;
  });
  canvas.addEventListener('mouseup', () => { firing = false; });
  canvas.addEventListener('mouseleave', () => { pointer.active = false; firing = false; });
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state === 'dialogue' || state === 'levelup') { advanceCutscene(); return; }
    const t = e.touches[0];
    const p = canvasPos(t.clientX, t.clientY);
    pointer.active = true; pointer.x = p.x; pointer.y = p.y;
    firing = true;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const p = canvasPos(t.clientX, t.clientY);
    pointer.active = true; pointer.x = p.x; pointer.y = p.y;
  }, { passive: false });
  canvas.addEventListener('touchend', () => { pointer.active = false; firing = false; });

  // --- Enra Enra boss (top of screen) ---
  function spawnBullet(x, y, vx, vy, r, kind) {
    bullets.push({ x, y, vx, vy, r: r || 5, kind: kind || 'smoke' });
  }

  function difficultyLevel() {
    // どの段階（紫・緑）でもレベル1相当から始まり、時間経過でなだらかに上がっていく
    const base = 1;
    const timeBonus = Math.floor(elapsed / 6);
    return base + timeBonus; // uncapped: keeps escalating indefinitely
  }

  // Boss visual stage based on how many times it has been defeated (kill count)
  // 0 kills: stage1 (mono logo), 1 kill: stage2 (red logo), 2 kills: stage3 (snake), 3+ kills: stage4 (tora)
  function bossStageKey() {
    const kills = boss.killCount || 0;
    if (kills <= 0) return 'boss1';
    if (kills === 1) return 'boss2';
    if (kills === 2) return 'boss3';
    if (kills <= 4) return 'boss4';
    return 'boss5'; // 5回目撃破以降（虎を2回撃破後）はレインボーロゴに進化
  }

  function bossPatternTick() {
    const lvl = difficultyLevel();
    const fleeMult = boss.fleeing ? 2.1 : 1;
    boss.x = W/2 + Math.sin(frame / (boss.fleeing ? 40 : 90)) * (W/2 - 70) * fleeMult * 0.48 + (W/2 - 70) * (1 - 0.48*fleeMult);
    boss.x = Math.max(50, Math.min(W - 50, boss.x));

    if (boss.fleeing) {
      boss.fleeTimer--;
      boss.y = 70 + Math.sin(frame / 15) * 14;
      if (boss.fleeTimer <= 0) { boss.fleeing = false; }
    }

    // Pattern A: radial burst, ring count and speed scale hard with level (always on)
    if (frame % Math.round(Math.max(16, 60 - lvl * 2.4)) === 0) {
      const count = Math.round(Math.min(48, 14 + lvl * 1.8));
      const speed = Math.min(3.68, 1.27 + lvl * 0.108);
      const rot = (frame / 30);
      for (let i = 0; i < count; i++) {
        const a = (Math.PI * 2 * i / count) + rot;
        spawnBullet(boss.x, boss.y, Math.cos(a) * speed, Math.sin(a) * speed, 4);
      }
    }

    // Pattern A2: second interleaved ring from level 6+, offset phase for flower pattern
    if (lvl >= 6 && frame % Math.max(14, 50 - lvl * 3) === 8) {
      const count = Math.min(36, 10 + lvl * 2);
      const speed = Math.min(3.19, 0.98 + lvl * 0.088);
      const rot = -(frame / 34);
      for (let i = 0; i < count; i++) {
        const a = (Math.PI * 2 * i / count) + rot;
        spawnBullet(boss.x, boss.y, Math.cos(a) * speed, Math.sin(a) * speed, 3.5, 'fan');
      }
    }

    // Pattern B: fast aimed fan toward player, from level 7+ (widens with level)
    if (lvl >= 7 && frame % 36 === 0) {
      const dx = player.x - boss.x, dy = player.y - boss.y;
      const baseA = Math.atan2(dy, dx);
      const spreadCount = Math.min(11, 5 + Math.floor(lvl/3));
      const spread = 4.5;
      const speed = Math.min(3.2, 1.7 + lvl * 0.08);
      for (let i = -(spreadCount-1)/2; i <= (spreadCount-1)/2; i++) {
        const a = baseA + (i * spread * Math.PI / 180);
        spawnBullet(boss.x, boss.y, Math.cos(a) * speed, Math.sin(a) * speed, 4.5, 'fan');
      }
    }

    // Pattern C: slow drifting large smoke orbs, constant stream from level 8+
    // 蛇の段階（撃破2回目）だけは出さない。虎の段階（撃破3回目以降）では復活する
    const isSnakeStageOnly = (boss.killCount || 0) === 2;
    if (lvl >= 8 && !isSnakeStageOnly && frame % 55 === 0) {
      spawnBullet(boss.x - 40, boss.y + 10, -0.54, 1.27, 10, 'orb');
      spawnBullet(boss.x + 40, boss.y + 10, 0.54, 1.27, 10, 'orb');
    }

    // Pattern D: dense double spiral from level 9+
    if (lvl >= 9 && frame % 3 === 0) {
      const a = frame * 0.5;
      const speed = Math.min(3.68, 2.25 + (lvl-9) * 0.074);
      spawnBullet(boss.x, boss.y, Math.cos(a) * speed, Math.sin(a) * speed, 3.2, 'spiral');
      spawnBullet(boss.x, boss.y, Math.cos(a + Math.PI) * speed, Math.sin(a + Math.PI) * speed, 3.2, 'spiral');
    }

    // Pattern E: wall of bullets sweeping from the sides, from level 11+
    if (lvl >= 11 && frame % 90 < 40 && frame % 4 === 0) {
      const side = Math.floor(frame / 90) % 2 === 0 ? 0 : W;
      const dir = side === 0 ? 1 : -1;
      const y = 40 + ((frame % 40) * 10);
      spawnBullet(side, y, dir * 2.84, 0, 4, 'fan');
    }

    // Pattern F: full-screen curtain pulse, from level 13+
    if (lvl >= 13 && frame % 180 === 0) {
      const count = Math.min(56, 40 + (lvl-13) * 2);
      const speed = Math.min(3.92, 3.04 + (lvl-13) * 0.049);
      for (let i = 0; i < count; i++) {
        const a = (Math.PI * 2 * i / count);
        spawnBullet(boss.x, boss.y, Math.cos(a) * speed, Math.sin(a) * speed, 3, 'spiral');
      }
    }
  }

  function updateShots() {
    const ch = currentChar();
    if (shotCooldown > 0) shotCooldown--;
    if (firing && shotCooldown <= 0 && state === 'playing') {
      const power = Math.min(2, Math.floor(elapsed / 8)); // 0,1,2 as time passes
      const vy = -ch.shotSpeed;

      // ナカノ（攻撃型）: 一定確率で敵弾を破壊する特殊弾を混ぜつつ、基本弾数も多め
      const isDestroyerShot = ch.destroyerChance && Math.random() < ch.destroyerChance;
      const shotKind = isDestroyerShot ? 'destroyer' : 'normal';

      if (power === 0) {
        shots.push({ x: player.x, y: player.y - 12, vx: 0, vy: vy, kind: shotKind });
        if (ch.destroyerChance) {
          // 攻撃型は基本弾数が多い：左右にも軽い追加弾
          shots.push({ x: player.x - 6, y: player.y - 8, vx: -0.5, vy: vy, kind: 'normal' });
          shots.push({ x: player.x + 6, y: player.y - 8, vx: 0.5, vy: vy, kind: 'normal' });
        }
      } else if (power === 1) {
        shots.push({ x: player.x - 5, y: player.y - 10, vx: -0.6, vy: vy, kind: shotKind });
        shots.push({ x: player.x + 5, y: player.y - 10, vx: 0.6, vy: vy, kind: 'normal' });
        if (ch.destroyerChance) {
          shots.push({ x: player.x, y: player.y - 12, vx: 0, vy: vy, kind: 'normal' });
        }
      } else {
        shots.push({ x: player.x, y: player.y - 12, vx: 0, vy: vy*1.05, kind: shotKind });
        shots.push({ x: player.x - 7, y: player.y - 9, vx: -1.4, vy: vy, kind: 'normal' });
        shots.push({ x: player.x + 7, y: player.y - 9, vx: 1.4, vy: vy, kind: 'normal' });
        if (ch.destroyerChance) {
          shots.push({ x: player.x - 12, y: player.y - 6, vx: -2.0, vy: vy, kind: 'normal' });
          shots.push({ x: player.x + 12, y: player.y - 6, vx: 2.0, vy: vy, kind: 'normal' });
        }
      }
      shotCooldown = ch.fireRate;
    }

    // せっき〜（成長型）: 難易度レベルが上がるほど攻撃力が伸びる
    const baseDamage = 4;
    const growBonus = ch.growAtk ? Math.min(4, difficultyLevel() * 0.12) : 0;
    const shotDamage = baseDamage + growBonus;

    for (let i = shots.length - 1; i >= 0; i--) {
      const s = shots[i];
      s.x += s.vx || 0; s.y += s.vy;
      if (s.y < -10 || s.x < -10 || s.x > W+10) { shots.splice(i, 1); continue; }

      // 攻撃型の特殊弾: 敵弾に当たると、その敵弾を破壊する
      if (s.kind === 'destroyer') {
        let destroyed = false;
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          const bd = Math.hypot(s.x - b.x, s.y - b.y);
          if (bd < b.r + 5) {
            bullets.splice(j, 1);
            destroyed = true;
            for (let k = 0; k < 3; k++) {
              const a = Math.random() * Math.PI * 2;
              particles.push({ x: b.x, y: b.y, vx: Math.cos(a)*1.2, vy: Math.sin(a)*1.2, life: 14 });
            }
            break;
          }
        }
        if (destroyed) { shots.splice(i, 1); continue; }
      }

      const d = Math.hypot(s.x - boss.x, s.y - boss.y);
      if (d < boss.r) {
        shots.splice(i, 1);
        damageBoss(shotDamage);
      }
    }
  }

  function advanceCutscene() {
    if (state === 'dialogue') {
      // セリフ表示 → レベル表示へ
      displayLevelNumber = pendingLevelNumber;
      state = 'levelup';
    } else if (state === 'levelup') {
      // レベル表示 → カウントダウンへ（ここから先は自動進行）
      countdownValue = 3;
      countdownTicker = COUNTDOWN_TICK_FRAMES;
      state = 'countdown';
    }
  }

  function damageBoss(amount) {
    if (boss.fleeing) return;
    boss.hp -= amount;
    score += 6;
    for (let i = 0; i < 4; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({ x: boss.x, y: boss.y, vx: Math.cos(a)*1.4, vy: Math.sin(a)*1.4, life: 16 });
    }
    if (boss.hp <= 0) {
      boss.hp = BOSS_MAX_HP;
      boss.fleeing = true;
      boss.fleeTimer = 150;
      boss.everFled = true;
      boss.killCount = (boss.killCount || 0) + 1;
      score += 300;

      if (boss.killCount >= 10) {
        // コンプリート演出（レベル10撃破）
        showCompleteScreen();
        return;
      }

      const line = getKillLine(currentChar().key, boss.killCount);
      dialogueText = line || '';
      pendingLevelNumber = boss.killCount + 1; // 撃破後に上がる「レベル」の表示用（演出上のレベル、難易度レベルとは別カウント）
      state = 'dialogue';
    }
  }

  function updatePlayer() {
    const ch = currentChar();
    const speed = ch.speed;
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.hypot(dx, dy) || 1;
      player.x += (dx/len) * speed;
      player.y += (dy/len) * speed;
    } else if (pointer.active) {
      player.x += (pointer.x - player.x) * 0.25;
      player.y += (pointer.y - player.y) * 0.25;
    }

    player.x = Math.max(player.r + 2, Math.min(W - player.r - 2, player.x));
    player.y = Math.max(player.r + 2, Math.min(H - player.r - 2, player.y));
  }

  function updateBullets() {
    const ch = currentChar();
    const effectiveR = player.r * (ch.hitboxScale || 1);
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy;
      if (b.kind === 'orb') { b.vy += 0.004; }
      if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
        bullets.splice(i, 1);
        continue;
      }
      if (invuln <= 0) {
        const d = Math.hypot(b.x - player.x, b.y - player.y);
        if (d < b.r + effectiveR - 2) {
          // ソノ（忍耐型）: 一定確率で敵弾の命中を無効化（すり抜け）
          if (ch.dodgeChance && Math.random() < ch.dodgeChance) {
            bullets.splice(i, 1);
            for (let k = 0; k < 5; k++) {
              const a = Math.random() * Math.PI * 2;
              particles.push({ x: b.x, y: b.y, vx: Math.cos(a)*1.6, vy: Math.sin(a)*1.6, life: 18 });
            }
            continue;
          }
          bullets.splice(i, 1);
          hitPlayer();
        }
      }
    }
  }

  function hitPlayer() {
    life -= 1;
    invuln = 90;
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*2, vy: Math.sin(a)*2, life: 26 });
    }
    updateHud();
    if (life <= 0) endGame();
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life -= 1;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function draw() {
    ctx.fillStyle = '#050202';
    ctx.fillRect(0, 0, W, H);

    // faint scanline grid, LP tile-red tone
    ctx.strokeStyle = 'rgba(120,30,30,0.10)';
    ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 4) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // boss (image sprite, stage depends on kill count)
    const pulsate = Math.sin(frame / 12) * 2;
    const bossImg = IMG[bossStageKey()];
    const bossSize = (boss.r * 2.6) + pulsate;
    ctx.save();
    ctx.globalAlpha = boss.fleeing ? 0.6 : 1;
    if (bossImg && bossImg.complete) {
      const ratio = bossImg.width / bossImg.height;
      let dw = bossSize, dh = bossSize / ratio;
      if (dh > bossSize) { dh = bossSize; dw = bossSize * ratio; }
      ctx.drawImage(bossImg, boss.x - dw/2, boss.y - dh/2, dw, dh);
    }
    ctx.restore();

    // boss HP bar
    const barW = 200, barX = W/2 - barW/2, barY = 24;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(barX, barY, barW, 6);
    ctx.fillStyle = boss.fleeing ? '#00ff66' : '#d41818';
    ctx.fillRect(barX, barY, barW * Math.max(0, boss.hp / BOSS_MAX_HP), 6);

    // player shots
    for (const s of shots) {
      if (s.kind === 'destroyer') {
        ctx.fillStyle = '#ffe9b0';
        ctx.fillRect(s.x - 2.5, s.y - 8, 5, 13);
      } else {
        ctx.fillStyle = '#00ff66';
        ctx.fillRect(s.x - 1.5, s.y - 6, 3, 10);
      }
    }

    // bullets
    for (const b of bullets) {
      let color = '#e8a8a8';
      if (b.kind === 'fan') color = '#ff4b4b';
      if (b.kind === 'orb') color = '#00ff66';
      if (b.kind === 'spiral') color = '#ffb84d';
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fill();
    }

    // particles
    for (const p of particles) {
      ctx.fillStyle = 'rgba(232,220,180,' + Math.max(0, p.life/26) + ')';
      ctx.fillRect(p.x-2, p.y-2, 3, 3);
    }

    // player (image sprite)
    const flashHidden = invuln > 0 && Math.floor(frame/4) % 2 === 0;
    if (!flashHidden) {
      const ch = currentChar();
      const pImg = IMG[ch.key];
      const pSize = player.r * 4.4;
      if (pImg && pImg.complete) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(player.x, player.y, pSize/2, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(pImg, player.x - pSize/2, player.y - pSize/2, pSize, pSize);
        ctx.restore();
      }
    }

    // dialogue / levelup フェーズ（ゲームを一時停止して表示、クリックで進行）
    if (state === 'dialogue' && dialogueText) {
      ctx.save();
      ctx.fillStyle = 'rgba(5,2,2,0.72)';
      ctx.fillRect(0, 0, W, H);

      const boxH = 92;
      const boxY = H - boxH - 20;
      ctx.fillStyle = 'rgba(15,4,4,0.94)';
      ctx.fillRect(14, boxY, W - 28, boxH);
      ctx.strokeStyle = 'rgba(212,175,55,0.6)';
      ctx.lineWidth = 1;
      ctx.strokeRect(14, boxY, W - 28, boxH);

      // 右側にキャラのイラストを円形で表示
      const portraitSize = boxH - 16;
      const portraitCx = W - 14 - 16 - portraitSize/2;
      const portraitCy = boxY + boxH/2;
      const ch = currentChar();
      const pImg = IMG[ch.key];
      if (pImg && pImg.complete) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(portraitCx, portraitCy, portraitSize/2, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(pImg, portraitCx - portraitSize/2, portraitCy - portraitSize/2, portraitSize, portraitSize);
        ctx.restore();
        ctx.strokeStyle = 'rgba(212,175,55,0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(portraitCx, portraitCy, portraitSize/2, 0, Math.PI*2);
        ctx.stroke();
      }

      const textMaxX = portraitCx - portraitSize/2 - 12;
      const textWidth = textMaxX - 24;

      ctx.fillStyle = '#d4af37';
      ctx.font = '13px "Noto Serif JP", serif';
      ctx.textAlign = 'left';
      ctx.fillText(ch.name, 24, boxY + 22);

      ctx.fillStyle = '#e8dcc8';
      ctx.font = '14px "Noto Serif JP", serif';
      wrapText(ctx, dialogueText, 24, boxY + 44, textWidth, 18);

      ctx.fillStyle = 'rgba(0,255,102,0.65)';
      ctx.font = '11px "Noto Serif JP", serif';
      ctx.textAlign = 'left';
      const blinkOn = Math.floor(cutsceneFrame / 30) % 2 === 0;
      if (blinkOn) ctx.fillText('▶ タップして次へ', 24, boxY + boxH - 8);
      ctx.restore();
    }

    if (state === 'levelup') {
      ctx.save();
      ctx.fillStyle = 'rgba(5,2,2,0.82)';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#ffe9b0';
      ctx.font = 'bold 34px "VT323", "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL ' + displayLevelNumber, W/2, H/2 - 6);

      ctx.fillStyle = 'rgba(0,255,102,0.7)';
      ctx.font = '12px "Noto Serif JP", serif';
      const blinkOn = Math.floor(cutsceneFrame / 30) % 2 === 0;
      if (blinkOn) ctx.fillText('▶ タップして開始', W/2, H/2 + 28);
      ctx.textAlign = 'left';
      ctx.restore();
    }

    if (state === 'countdown') {
      ctx.save();
      ctx.fillStyle = 'rgba(5,2,2,0.6)';
      ctx.fillRect(0, 0, W, H);

      // カウントダウン数字がティックごとに軽くスケールインする演出
      const tickProgress = 1 - (countdownTicker / COUNTDOWN_TICK_FRAMES);
      const scale = 0.7 + Math.min(1, tickProgress * 2.2) * 0.3;

      ctx.fillStyle = '#ff4b4b';
      ctx.textAlign = 'center';
      ctx.save();
      ctx.translate(W/2, H/2);
      ctx.scale(scale, scale);
      ctx.font = 'bold 72px "VT323", "Courier New", monospace';
      ctx.fillText(String(countdownValue), 0, 20);
      ctx.restore();
      ctx.textAlign = 'left';
      ctx.restore();
    }
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    let line = '';
    let lines = [];
    for (const ch of text) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line !== '') {
        lines.push(line);
        line = ch;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    lines = lines.slice(0, 3); // 最大3行まで
    lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
  }

  function gameLoop() {
    if (state === 'playing') {
      frame++;
      elapsed = frame / 60;
      score += 1 + difficultyLevel();
      if (invuln > 0) invuln--;
      updatePlayer();
      bossPatternTick();
      updateShots();
      updateBullets();
      updateParticles();
      updateHud();
    } else if (state === 'dialogue' || state === 'levelup') {
      cutsceneFrame++;
    } else if (state === 'countdown') {
      cutsceneFrame++;
      countdownTicker--;
      if (countdownTicker <= 0) {
        countdownValue--;
        if (countdownValue <= 0) {
          state = 'playing';
        } else {
          countdownTicker = COUNTDOWN_TICK_FRAMES;
        }
      }
    }
    draw();
    requestAnimationFrame(gameLoop);
  }

  function startWhenReady() {
    loadImages(() => {
      renderSelectScreen();
      draw();
      requestAnimationFrame(gameLoop);
    });
  }

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(startWhenReady).catch(startWhenReady);
  } else {
    startWhenReady();
  }

  setInterval(() => {
    const el = document.getElementById('clock-blink');
    if (el) el.style.visibility = el.style.visibility === 'hidden' ? 'visible' : 'hidden';
  }, 600);
})();

</script>

</body>
