<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙台水煙草喫茶 煙羅煙羅 5th Anniversary</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0000;
    --tile-line: #5a1414;
    --red: #c41818;
    --darkred: #3a0808;
    --gold: #d4af37;
    --green-led: #00ff66;
    --white: #e8e0d8;
    --dim: #8a7a70;
  }

  body {
    background-color: #060000;
    background-image:
      repeating-linear-gradient(0deg, var(--tile-line) 0px, var(--tile-line) 1px, transparent 1px, transparent 86px),
      repeating-linear-gradient(90deg, var(--tile-line) 0px, var(--tile-line) 1px, transparent 1px, transparent 86px);
    color: var(--white);
    font-family: "MS Gothic", "ＭＳ ゴシック", sans-serif;
    font-size: 14px;
    min-height: 100vh;
    position: relative;
  }

 .tile-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.6;
    background-image: url("tile-bg.png");
    background-repeat: repeat;
    background-size: 320px auto;
    filter: saturate(1.8);
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 14px 10px 40px;
  }

 .banner {
    text-align: center;
    padding: 0px 8px 0px;
  }
  .banner-sub {
    display: inline-block;
    background: linear-gradient(180deg, #d41818, #7a0606);
    border: 2px solid #ffb84d;
    color: #ffe9b0;
    font-size: 13px;
    padding: 3px 18px;
    letter-spacing: 0.15em;
    border-radius: 2px;
    text-shadow: 1px 1px 0 #000;
    margin-bottom: 4px;
  }
  .banner-title {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 0.05em;
    margin: 4px 0;
    background: linear-gradient(180deg, #fff6cf 0%, #e8c34a 35%, #b8860b 60%, #8a5a00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
  }
  .banner-welcome {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 0.1em;
    font-style: italic;
  }
  .banner-welcome span:nth-child(1) { color: #ff4b4b; }
  .banner-welcome span:nth-child(2) { color: #ff8c2b; }
  .banner-welcome span:nth-child(3) { color: #ffe24b; }
  .banner-welcome span:nth-child(4) { color: #6bff4b; }
  .banner-welcome span:nth-child(5) { color: #4bd3ff; }
  .banner-welcome span:nth-child(6) { color: #4b6bff; }
  .banner-welcome span:nth-child(7) { color: #c14bff; }
  .banner-welcome span { text-shadow: 1px 1px 0 #000; }

  .counter-area {
    text-align: center;
    padding: 0px 0 8px;
  }
  .counter-label {
    font-size: 13px;
    color: var(--white);
    margin-bottom: 4px;
  }
  .counter-led {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    background: #000;
    border: 3px solid #444;
    padding: 8px 16px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  }
  .counter-digits {
    font-family: "Courier New", monospace;
    font-size: 34px;
    font-weight: bold;
    color: var(--green-led);
    text-shadow: 0 0 8px rgba(0,255,102,0.7), 0 0 2px rgba(0,255,102,0.9);
    letter-spacing: 2px;
  }
  .counter-label2 { font-size: 13px; color: var(--white); margin-top: 4px; }

  .marquee-bar {
    background: linear-gradient(180deg, #9c1414, #5c0808);
    border-top: 1px solid #ff6b6b;
    border-bottom: 1px solid #3a0303;
    padding: 6px 8px;
    font-size: 12px;
    color: #ffe9b0;
    text-align: center;
    letter-spacing: 0.05em;
    margin: 10px 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .menu-list {
    margin: 18px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .menu-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    text-decoration: none;
    border-bottom: 1px dashed #4a2020;
  }
  .menu-icon {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .menu-badge {
    font-size: 10px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .badge-new {
    background: #d41818;
    color: #fff;
    border: 1px solid #ffe9b0;
  }
  .badge-kouji {
    background: #2a8a2a;
    color: #fff;
    border: 1px solid #c4ffc4;
  }
  .menu-text {
    color: var(--white);
    font-size: 16px;
    letter-spacing: 0.08em;
  }
  .menu-row:hover .menu-text { color: #ffe9b0; }

  .sns-row {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin: 24px 0 10px;
    flex-wrap: nowrap;
  }
  .sns-banner {
    display: inline-block;
    line-height: 0;
    flex: 1;
    max-width: 160px;
  }
  .sns-banner img {
    width: 100%;
    height: auto;
    display: block;
  }

  footer {
    text-align: center;
    font-size: 10px;
    color: #6a5a50;
    padding: 30px 10px 10px;
    line-height: 2;
  }
  footer a { color: #8a7a70; text-decoration: none; }

  @media (max-width: 480px) {
    .banner-title { font-size: 34px; }
    .banner-welcome { font-size: 20px; }
    .counter-digits { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="tile-bg"></div>

<div class="wrap">

  <div class="banner">
    <img src="logo.png" alt="仙台水煙草喫茶 煙羅煙羅" style="width:100%; max-width:480px; display:block; margin:0 auto -350px;">
   <img src="welcome.png" alt="WELCOME" style="width:100%; max-width:520px; display:block; margin:-10px auto -200px;">
  </div>

  <div class="counter-area">
    <div class="counter-label">あなたは</div>
    <div class="counter-led">
      <span class="counter-digits" id="counterNum">000000</span>
    </div>
    <div class="counter-label2">人目の訪問者です</div>
  </div>

  <div class="marquee-bar">
    〜キリ番踏み逃げ禁止　　報告はBBSにカキコしてください！〜
  </div>

  <nav class="menu-list">
    <a href="about.html" class="menu-row">
      <img src="ghost.gif" class="menu-gif" alt="プロフィール">
      <div class="menu-text">プロフィール</div>
    </a>
    <a href="event.html" class="menu-row">
      <img src="new.gif" class="menu-gif" alt="NEW">
      <div class="menu-text">5周年記念企画</div>
    </a>
    <a href="bbs.html" class="menu-row">
      <img src="fire.gif" class="menu-gif" alt="BBS">
      <div class="menu-text">電子掲示板（BBS）</div>
    </a>
    <a href="diary.html" class="menu-row">
      <img src="fire.gif" class="menu-gif" alt="日記">
      <div class="menu-text">謎の日記</div>
    </a>
    <a href="download.html" class="menu-row">
      <img src="kouji.gif" class="menu-gif" alt="工事中">
      <div class="menu-text">ダウンロード</div>
    </a>
  </nav>

 /* バナー */
<footer>
  仙台水煙草喫茶　煙羅煙羅 5th Anniversary &copy; 2025<br>
  <a href="index.html">TOP</a> ／
  <a href="bbs.html">掲示板</a> ／
  <a href="diary.html">謎の日記</a><br><br>
  <span style="font-size:9px;">このサイトはInternet Explorer 6.0以上推奨です</span>
</footer>

<script>
  let count = parseInt(localStorage.getItem("enraCounter") || "665") + 1;
  localStorage.setItem("enraCounter", count);
  document.getElementById("counterNum").textContent = String(count).padStart(6, "0");
</script>

</body>
</html>
