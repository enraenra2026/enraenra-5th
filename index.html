<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>煙羅煙羅 5th Anniversary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --border: #2a2a2a;
      --white: #e8e8e0;
      --dim: #888880;
      --accent: #c8b89a;
      --glitch1: #4affda;
      --glitch2: #ff4a6e;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
      font-size: 14px;
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .site-title { font-size: 12px; color: var(--accent); letter-spacing: 0.15em; }
    .header-right { font-size: 11px; color: var(--dim); letter-spacing: 0.05em; }
    .browser-bar {
      border: 1px solid var(--border);
      margin: 20px auto;
      max-width: 720px;
      background: #1a1a1a;
    }
    .browser-chrome {
      background: #222;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .browser-dots { display: flex; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
    .browser-url {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      color: var(--dim);
      font-size: 11px;
      padding: 2px 8px;
      font-family: monospace;
    }
    .browser-content { padding: 32px 24px 40px; }
    .counter-block { text-align: center; margin-bottom: 32px; }
    .counter-label { font-size: 11px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 6px; }
    .counter-digits { display: inline-flex; gap: 2px; }
    .digit {
      background: #000;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 22px;
      font-family: "Courier New", monospace;
      width: 28px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }
    .hero { text-align: center; padding: 40px 16px 32px; }
    .hero-eyebrow { font-size: 11px; color: var(--dim); letter-spacing: 0.3em; margin-bottom: 16px; }
    .hero-title {
      font-size: clamp(28px, 8vw, 52px);
      font-family: "MS Mincho", "ＭＳ 明朝", serif;
      letter-spacing: 0.2em;
      line-height: 1.3;
      color: var(--white);
      display: inline-block;
      position: relative;
    }
    .hero-title::before, .hero-title::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0;
    }
    .hero-title::before {
      color: var(--glitch1);
      animation: glitch1 8s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    }
    .hero-title::after {
      color: var(--glitch2);
      animation: glitch2 8s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    }
    @keyframes glitch1 {
      0%,90%,100% { opacity:0; transform:none; }
      91% { opacity:0.7; transform:translate(-3px,0); }
      92% { opacity:0; }
      94% { opacity:0.5; transform:translate(3px,0); }
      95% { opacity:0; }
    }
    @keyframes glitch2 {
      0%,92%,100% { opacity:0; transform:none; }
      93% { opacity:0.6; transform:translate(3px,0); }
      94% { opacity:0; }
      96% { opacity:0.4; transform:translate(-2px,0); }
      97% { opacity:0; }
    }
    .hero-sub { margin-top: 16px; font-size: 12px; color: var(--dim); letter-spacing: 0.2em; }
    .hero-copy { margin-top: 24px; font-size: 13px; color: var(--accent); letter-spacing: 0.1em; line-height: 2; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .divider-text { text-align: center; font-size: 11px; color: var(--border); letter-spacing: 0.2em; margin: 16px 0; }
