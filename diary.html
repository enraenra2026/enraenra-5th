<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謎の日記 ─ 煙羅煙羅 5th Anniversary</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --border: #2a2a2a;
    --white: #e8e8e0;
    --dim: #888880;
    --accent: #c8b89a;
  }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
    font-size: 14px;
    line-height: 1.8;
    min-height: 100vh;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .site-title { font-size: 12px; color: var(--accent); letter-spacing: 0.15em; }
  .header-right { font-size: 11px; color: var(--dim); }
  .header-right a { color: var(--dim); text-decoration: none; }
  .header-right a:hover { color: var(--accent); }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
  .page-head { text-align: center; padding: 32px 16px 24px; }
  .page-eyebrow { font-size: 11px; color: var(--dim); letter-spacing: 0.3em; margin-bottom: 12px; }
  .page-title {
    font-size: clamp(24px, 6vw, 36px);
    font-family: "MS Mincho", serif;
    letter-spacing: 0.2em;
    color: var(--white);
  }
  .page-sub { margin-top: 12px; font-size: 11px; color: var(--dim); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .preface {
    border: 1px solid var(--border);
    padding: 20px;
    margin: 24px 0 32px;
    font-size: 12px;
    color: var(--dim);
    line-height: 2.1;
  }
  .preface strong { color: var(--accent); font-weight: normal; }
  .record-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .record-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    text-decoration: none;
    transition: all 0.15s;
  }
  .record-item:hover {
    border-color: var(--accent);
    background: rgba(200,184,154,0.04);
  }
  .record-item .num {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    flex-shrink: 0;
  }
  .record-item .title {
    font-size: 13px;
    color: var(--white);
  }
  .record-item .date {
    margin-left: auto;
    font-size: 11px;
    color: var(--dim);
    flex-shrink: 0;
  }
  .record-item.locked {
    opacity: 0.5;
    pointer-events: none;
  }
  .record-item.locked .title { color: #555; }
  .record-item .lock { font-size: 13px; flex-shrink: 0; }
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 16px;
    text-align: center;
    font-size: 11px;
    color: var(--dim);
    line-height: 2;
    margin-top: 48px;
  }
  footer a { color: var(--dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <span class="site-title">煙羅煙羅 / ENRAENRA</span>
  <span class="header-right"><a href="index.html">TOP に戻る</a></span>
</header>

<div class="wrap">

  <div class="page-head">
    <div class="page-eyebrow">DIARY ── 2021</div>
    <div class="page-title">謎の日記</div>
    <div class="page-sub">この場所が「煙羅煙羅」になるまでの記録</div>
  </div>

  <div class="preface">
    開業当時、この場所に残されていた記録を、そのまま掲載しています。<br>
    書いた人間については、わかりません。<br>
    <strong>——スタッフ一同</strong>
  </div>

  <hr class="divider">

  <div class="record-list">

    <a href="diary-001.html" class="record-item">
      <span class="num">記録_001</span>
      <span class="title">はじめてこの場所に入った日</span>
      <span class="date">2021/3/23</span>
    </a>

    <div class="record-item locked">
      <span class="num">記録_002</span>
      <span class="lock">🔒</span>
      <span class="title">この記録は、まだ公開されていません</span>
    </div>

    <div class="record-item locked">
      <span class="num">記録_003</span>
      <span class="lock">🔒</span>
      <span class="title">この記録は、まだ公開されていません</span>
    </div>

  </div>

</div>

<footer>
  煙羅煙羅 5th Anniversary &copy; 2025<br>
  <a href="index.html">TOP</a> ／
  <a href="bbs.html">掲示板</a><br><br>
  <span style="font-size:10px; color:#444;">このサイトはInternet Explorer 6.0以上推奨です</span>
</footer>

</body>
</html>
